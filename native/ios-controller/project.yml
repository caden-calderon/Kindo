name: KindoIOSController
options:
  bundleIdPrefix: dev.playkindo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  KindoIOSController:
    path: .
targets:
  KindoIOSController:
    type: application
    platform: iOS
    sources:
      - path: Sources/KindoIOSControllerApp
    dependencies:
      - package: KindoIOSController
        product: KindoIOSControllerCore
    info:
      path: Sources/KindoIOSControllerApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.playkindo.controller
        PRODUCT_NAME: Kindo Controller
        GENERATE_INFOPLIST_FILE: NO
  KindoIOSControllerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/KindoIOSControllerTests
    dependencies:
      - target: KindoIOSController
      - package: KindoIOSController
        product: KindoIOSControllerCore
