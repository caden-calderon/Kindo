workflows:
  ios-controller-unsigned:
    name: iOS Controller unsigned build
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      xcode: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen
      - name: Generate Xcode project
        script: |
          cd native/ios-controller
          xcodegen generate
      - name: Test Swift protocol package
        script: |
          cd native/ios-controller
          swift test
      - name: Build iOS app without signing
        script: |
          cd native/ios-controller
          xcodebuild \
            -project KindoIOSController.xcodeproj \
            -scheme KindoIOSController \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
